# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

dotenv: [".env"]

vars:
  MIGRATIONS_DIR: ./internal/infrastructure/db/migration
  GOOSE_DRIVER: postgres
  GOOSE_DB: "postgres://{{.DB_POSTGRES_USER}}:{{.DB_POSTGRES_PASSWORD}}@{{.DB_POSTGRES_HOST}}:{{.DB_POSTGRES_PORT}}/{{.DB_POSTGRES_DB}}?sslmode=disable"

tasks:
  mig:new:
    desc: create migration
    requires:
      vars: [name]
    cmds:
      - goose -dir {{.MIGRATIONS_DIR}} create {{.name}} sql

  mig:up:
    desc: apply migrations
    cmds:
      - goose -dir {{.MIGRATIONS_DIR}} {{.GOOSE_DRIVER}} "{{.GOOSE_DB}}" up

  mig:down:
    desc: rollback last migration
    cmds:
      - goose -dir {{.MIGRATIONS_DIR}} {{.GOOSE_DRIVER}} "{{.GOOSE_DB}}" down

  mig:redo:
    desc: redo last migration
    cmds:
      - goose -dir {{.MIGRATIONS_DIR}} {{.GOOSE_DRIVER}} "{{.GOOSE_DB}}" down
      - goose -dir {{.MIGRATIONS_DIR}} {{.GOOSE_DRIVER}} "{{.GOOSE_DB}}" up

  mig:status:
    desc: show status
    cmds:
      - goose -dir {{.MIGRATIONS_DIR}} {{.GOOSE_DRIVER}} "{{.GOOSE_DB}}" status
