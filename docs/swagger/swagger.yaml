definitions:
  RegisterInput:
    properties:
      password:
        maxLength: 64
        minLength: 8
        type: string
      username:
        maxLength: 255
        minLength: 6
        type: string
    required:
    - password
    - username
    type: object
  RegisterOutput:
    properties:
      access_token:
        type: string
      access_token_expires_at:
        type: string
      refresh_token:
        type: string
      refresh_token_expires_at:
        type: string
    type: object
info:
  contact:
    email: info@toppira.com
    name: Ali Moradi
    url: toppira.com/support
  description: Echo is a social media platform where people can freely share their
    feelings without being judged.
  title: Echo Swagger Document
  version: 0.0.1
paths:
  /api/v1/auth/register:
    post:
      consumes:
      - application/json
      description: Creates a new user using username and password, and returns access/refresh
        tokens.
      parameters:
      - description: User registration input
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/RegisterInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/RegisterOutput'
        "400":
          description: Invalid input or business error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Register a new user account
      tags:
      - Authentication
swagger: "2.0"
